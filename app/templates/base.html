<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} — Leads Enrichment AI</title>
    <meta name="description" content="Leads Enrichment AI Admin Dashboard">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% include "partials/_sidebar.html" %}

    <div class="main">
        <div class="topbar">
            <h2>{% block page_title %}Dashboard{% endblock %}</h2>
            <span class="breadcrumb">{% block breadcrumb %}Admin{% endblock %}</span>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
