services:
  # ── PostgreSQL with pgvector ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: leads-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: leads_enrichment
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: leads-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Run Alembic Migrations ──
  migrate:
    build: .
    container_name: leads-migrate
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/leads_enrichment
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@postgres:5432/leads_enrichment
    depends_on:
      postgres:
        condition: service_healthy

  # ── FastAPI Web Server ──
  web:
    build: .
    container_name: leads-web
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/leads_enrichment
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@postgres:5432/leads_enrichment
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_NEWS_API_KEY: ${GOOGLE_NEWS_API_KEY:-}
      LUSHA_API_KEY: ${LUSHA_API_KEY:-}
      CLEARBIT_API_KEY: ${CLEARBIT_API_KEY:-}
      HUNTER_API_KEY: ${HUNTER_API_KEY:-}
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── Celery Worker ──
  worker:
    build: .
    container_name: leads-worker
    command: celery -A app.celery_app worker -Q enrichment --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/leads_enrichment
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@postgres:5432/leads_enrichment
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_NEWS_API_KEY: ${GOOGLE_NEWS_API_KEY:-}
      LUSHA_API_KEY: ${LUSHA_API_KEY:-}
      CLEARBIT_API_KEY: ${CLEARBIT_API_KEY:-}
      HUNTER_API_KEY: ${HUNTER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
